# يتحقق من البناء ويولّد sitemap محدثاً عند كل push (النشر على Cloudflare يشغّل npm run build أيضاً)
name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://manzilcare.com

      - name: Sitemap summary
        run: |
          echo "URLs in sitemap.xml: $(grep -c '<loc>' public/sitemap.xml)"
